<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모델하우스 상담 예약</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap');

  :root {
    --gold: #C8A96E;
    --gold-light: #E8D5A3;
    --dark: #1A1A2E;
    --dark-2: #16213E;
    --dark-3: #0F3460;
    --cream: #F5F0E8;
    --text: #2C2C2C;
    --muted: #888;
    --success: #4CAF50;
    --danger: #E57373;
    --border: rgba(200,169,110,0.3);
    --max-per-slot: 5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, var(--dark) 0%, var(--dark-3) 100%);
    color: white;
    padding: 2rem 1rem 3rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 60% 20%, rgba(200,169,110,0.15) 0%, transparent 60%);
  }
  header .badge {
    display: inline-block;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-size: 0.7rem;
    letter-spacing: 3px;
    padding: 4px 14px;
    margin-bottom: 1rem;
  }
  header h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.9rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 0.4rem;
  }
  header p {
    color: rgba(255,255,255,0.6);
    font-size: 0.85rem;
    font-weight: 300;
  }
  .gold-line {
    width: 40px; height: 2px;
    background: var(--gold);
    margin: 1.2rem auto 0;
  }

  /* ── TABS ── */
  .tab-bar {
    display: flex;
    background: white;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .tab-btn {
    flex: 1;
    padding: 1rem;
    border: none;
    background: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab-btn.active {
    color: var(--dark);
    border-bottom-color: var(--gold);
  }

  /* ── SECTIONS ── */
  .section { display: none; padding: 1.5rem 1rem 3rem; max-width: 640px; margin: 0 auto; }
  .section.active { display: block; }

  /* ── CALENDAR ── */
  .calendar-wrap {
    background: white;
    border-radius: 12px;
    padding: 1.2rem;
    box-shadow: 0 2px 16px rgba(0,0,0,0.07);
    margin-bottom: 1.5rem;
  }
  .cal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.2rem;
  }
  .cal-header h3 { font-family: 'Noto Serif KR', serif; font-size: 1.05rem; }
  .cal-nav { border: none; background: none; cursor: pointer; font-size: 1.2rem; color: var(--gold); padding: 4px 10px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-day-name { text-align: center; font-size: 0.72rem; color: var(--muted); padding: 6px 0; font-weight: 500; }
  .cal-day {
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    font-size: 0.82rem;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
    position: relative;
  }
  .cal-day:hover:not(.disabled):not(.past) { background: var(--cream); }
  .cal-day.selected { background: var(--dark); color: white; border-color: var(--dark); }
  .cal-day.today { border-color: var(--gold); color: var(--gold); font-weight: 700; }
  .cal-day.disabled, .cal-day.past { color: #ccc; cursor: default; }
  .cal-day .dot {
    position: absolute; bottom: 3px;
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--gold);
  }

  /* ── SLOTS ── */
  .slots-title { font-size: 0.8rem; color: var(--muted); font-weight: 500; letter-spacing: 1px; margin-bottom: 0.8rem; }
  .slots-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; }
  .slot-card {
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem 1rem;
    cursor: pointer;
    transition: all 0.18s;
    background: white;
    position: relative;
    overflow: hidden;
  }
  .slot-card:hover:not(.full) { border-color: var(--gold); }
  .slot-card.selected-slot { border-color: var(--gold); background: rgba(200,169,110,0.08); }
  .slot-card.full { opacity: 0.5; cursor: not-allowed; background: #fafafa; }
  .slot-time { font-size: 0.95rem; font-weight: 600; color: var(--dark); }
  .slot-count {
    font-size: 0.75rem;
    margin-top: 4px;
  }
  .slot-bar {
    height: 3px;
    background: #eee;
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
  }
  .slot-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--gold), #E8D5A3);
    transition: width 0.3s;
  }
  .slot-bar-fill.danger { background: linear-gradient(90deg, var(--danger), #FFCDD2); }
  .full-badge {
    position: absolute; top: 6px; right: 8px;
    background: var(--danger); color: white;
    font-size: 0.62rem; padding: 2px 6px; border-radius: 4px;
    font-weight: 700;
  }

  /* ── FORM ── */
  .form-card {
    background: white;
    border-radius: 12px;
    padding: 1.4rem;
    box-shadow: 0 2px 16px rgba(0,0,0,0.07);
    margin-top: 1.5rem;
  }
  .form-card h3 { font-family: 'Noto Serif KR', serif; font-size: 1rem; margin-bottom: 1.2rem; }
  .selected-summary {
    background: var(--cream);
    border-left: 3px solid var(--gold);
    padding: 0.8rem 1rem;
    border-radius: 0 8px 8px 0;
    font-size: 0.85rem;
    color: var(--dark);
    margin-bottom: 1.2rem;
  }
  .form-group { margin-bottom: 1rem; }
  label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--muted); letter-spacing: 0.5px; margin-bottom: 5px; }
  input, select, textarea {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1.5px solid #E0E0E0;
    border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    outline: none;
    transition: border 0.2s;
    background: white;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--gold); }
  textarea { resize: vertical; min-height: 80px; }
  .purpose-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
  .purpose-btn {
    padding: 0.65rem;
    border: 1.5px solid #E0E0E0;
    border-radius: 8px;
    background: white;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.83rem;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text);
  }
  .purpose-btn.active { border-color: var(--gold); background: rgba(200,169,110,0.1); font-weight: 600; }

  .submit-btn {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, var(--dark) 0%, var(--dark-3) 100%);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Noto Serif KR', serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 0.5rem;
    letter-spacing: 0.5px;
    transition: opacity 0.2s;
  }
  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── SUCCESS ── */
  .success-screen {
    text-align: center;
    padding: 3rem 1.5rem;
    animation: fadeIn 0.5s ease;
  }
  .success-icon {
    width: 70px; height: 70px;
    background: linear-gradient(135deg, var(--dark), var(--dark-3));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.5rem;
    font-size: 1.8rem;
  }
  .success-screen h2 { font-family: 'Noto Serif KR', serif; font-size: 1.4rem; margin-bottom: 0.8rem; }
  .success-screen p { color: var(--muted); font-size: 0.88rem; line-height: 1.6; }
  .confirm-box {
    background: white;
    border-radius: 12px;
    padding: 1.2rem;
    margin: 1.5rem 0;
    border: 1px solid var(--border);
    text-align: left;
  }
  .confirm-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid #f0f0f0; font-size: 0.85rem; }
  .confirm-row:last-child { border-bottom: none; }
  .confirm-row span:first-child { color: var(--muted); }
  .confirm-row span:last-child { font-weight: 600; }

  /* ── ADMIN ── */
  .admin-login {
    background: white;
    border-radius: 12px;
    padding: 2rem 1.5rem;
    box-shadow: 0 2px 16px rgba(0,0,0,0.07);
    text-align: center;
  }
  .admin-login h3 { font-family: 'Noto Serif KR', serif; margin-bottom: 1.5rem; }
  .admin-body { }

  .date-picker-row {
    display: flex; align-items: center; gap: 0.8rem;
    margin-bottom: 1.2rem;
  }
  .date-picker-row label { font-size: 0.8rem; white-space: nowrap; color: var(--muted); font-weight: 600; }
  .date-picker-row input { flex: 1; }

  .reservation-list { }
  .res-day-header {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 1px;
    font-weight: 600;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.8rem;
    margin-top: 1.2rem;
  }
  .res-item {
    background: white;
    border-radius: 10px;
    padding: 1rem;
    margin-bottom: 0.6rem;
    border: 1px solid #eee;
    display: flex;
    align-items: flex-start;
    gap: 0.8rem;
  }
  .res-time-badge {
    background: var(--dark);
    color: var(--gold);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .res-info { flex: 1; }
  .res-name { font-weight: 600; font-size: 0.9rem; }
  .res-detail { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
  .res-purpose {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(200,169,110,0.15);
    color: #8B6914;
    display: inline-block;
    margin-top: 4px;
    font-weight: 500;
  }
  .res-delete {
    border: none;
    background: none;
    color: #ccc;
    cursor: pointer;
    font-size: 1.1rem;
    padding: 2px;
    flex-shrink: 0;
  }
  .res-delete:hover { color: var(--danger); }

  .admin-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.8rem;
    margin-bottom: 1.5rem;
  }
  .stat-card {
    background: white;
    border-radius: 10px;
    padding: 1rem;
    text-align: center;
    border: 1px solid var(--border);
  }
  .stat-num { font-family: 'Noto Serif KR', serif; font-size: 1.6rem; font-weight: 700; color: var(--dark); }
  .stat-label { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }

  .setting-row {
    display: flex; align-items: center; justify-content: space-between;
    background: white; border-radius: 10px; padding: 1rem 1.2rem;
    margin-bottom: 0.8rem; border: 1px solid var(--border);
    font-size: 0.88rem;
  }
  .setting-row input[type=number] {
    width: 70px; text-align: center; font-weight: 700;
  }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
    font-size: 0.88rem;
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.8rem; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

  .toast {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    background: var(--dark); color: white;
    padding: 0.75rem 1.5rem;
    border-radius: 30px;
    font-size: 0.85rem;
    z-index: 9999;
    animation: fadeIn 0.3s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }

  .loader { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.88rem; }

  .export-btn {
    width: 100%;
    padding: 0.75rem;
    border: 1.5px solid var(--gold);
    border-radius: 8px;
    background: white;
    color: var(--dark);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 1rem;
    transition: all 0.15s;
  }
  .export-btn:hover { background: rgba(200,169,110,0.1); }

  .section-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.05rem;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
    margin-left: 0.5rem;
  }
</style>
</head>
<body>

<header>
  <div class="badge">RESERVATION SYSTEM</div>
  <h1 id="headerTitle">모델하우스 상담 예약</h1>
  <p id="headerSub">전문 상담사와 1:1 맞춤 상담을 예약하세요</p>
  <div class="gold-line"></div>
</header>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('booking')">📅 예약하기</button>
  <button class="tab-btn" onclick="switchTab('admin')">🔒 관리자</button>
</div>

<!-- ═══ BOOKING SECTION ═══ -->
<div id="section-booking" class="section active">

  <div id="bookingFlow">
    <!-- STEP 1: Calendar -->
    <div id="step1">
      <div class="calendar-wrap">
        <div class="cal-header">
          <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
          <h3 id="calTitle"></h3>
          <button class="cal-nav" onclick="changeMonth(1)">›</button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>

      <div id="slotsWrap" style="display:none;">
        <p class="slots-title">⏱ 시간대 선택</p>
        <div class="slots-grid" id="slotsGrid"></div>
      </div>
    </div>

    <!-- STEP 2: Form -->
    <div id="step2" style="display:none;">
      <div class="form-card">
        <h3>📋 예약자 정보</h3>
        <div class="selected-summary" id="selectedSummary"></div>

        <div class="form-group">
          <label>상담 목적</label>
          <div class="purpose-grid" id="purposeGrid"></div>
        </div>

        <div class="form-group">
          <label>성함 *</label>
          <input type="text" id="fname" placeholder="홍길동">
        </div>
        <div class="form-group">
          <label>연락처 *</label>
          <input type="tel" id="fphone" placeholder="010-0000-0000">
        </div>
        <div class="form-group">
          <label>참석 인원</label>
          <select id="fcount">
            <option value="1">1명</option>
            <option value="2">2명</option>
            <option value="3">3명</option>
            <option value="4">4명</option>
          </select>
        </div>
        <div class="form-group">
          <label>메모 (선택)</label>
          <textarea id="fnote" placeholder="문의사항이나 특이사항을 적어주세요"></textarea>
        </div>

        <button class="submit-btn" onclick="submitReservation()">예약 확정하기 →</button>
        <button style="width:100%;margin-top:0.8rem;padding:0.8rem;border:none;background:none;color:var(--muted);font-family:'Noto Sans KR',sans-serif;cursor:pointer;" onclick="goBack()">← 시간 다시 선택</button>
      </div>
    </div>
  </div>

  <!-- SUCCESS -->
  <div id="successScreen" style="display:none;" class="success-screen">
    <div class="success-icon">✓</div>
    <h2>예약이 완료되었습니다</h2>
    <p>상담 당일 방문해 주시면 됩니다.<br>문의사항은 모델하우스로 연락주세요.</p>
    <div class="confirm-box" id="confirmBox"></div>
    <button class="submit-btn" onclick="resetBooking()" style="max-width:280px;margin:0 auto;display:block;">새 예약 하기</button>
  </div>
</div>

<!-- ═══ ADMIN SECTION ═══ -->
<div id="section-admin" class="section">
  <div id="adminLoginWrap">
    <div class="admin-login">
      <h3>🔒 관리자 로그인</h3>
      <div class="form-group" style="margin-bottom:1rem;">
        <input type="password" id="adminPw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')adminLogin()">
      </div>
      <button class="submit-btn" onclick="adminLogin()">로그인</button>
      <p style="font-size:0.75rem;color:var(--muted);margin-top:1rem;">기본 비밀번호: 1234</p>
    </div>
  </div>

  <div id="adminBody" style="display:none;" class="admin-body">
    <div class="section-title">설정</div>

    <div class="setting-row">
      <span>시간당 최대 예약 인원</span>
      <div style="display:flex;align-items:center;gap:0.5rem;">
        <button onclick="adjustMax(-1)" style="border:1px solid #ddd;background:white;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:1rem;line-height:1;">-</button>
        <input type="number" id="maxPerSlot" value="5" min="1" max="20" onchange="saveSettings()">
        <button onclick="adjustMax(1)" style="border:1px solid #ddd;background:white;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:1rem;line-height:1;">+</button>
      </div>
    </div>

    <div class="setting-row" style="flex-direction:column;align-items:flex-start;gap:0.5rem;">
      <span>운영 시간대 (쉼표 구분)</span>
      <input id="slotsConfig" value="09:00,10:00,11:00,13:00,14:00,15:00,16:00" onblur="saveSettings()" style="width:100%;font-size:0.82rem;">
    </div>

    <div class="setting-row" style="flex-direction:column;align-items:flex-start;gap:0.5rem;">
      <span>운영 요일</span>
      <div id="weekdayBtns" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
    </div>

    <div class="setting-row">
      <span>예약 불가일 추가</span>
      <input type="date" id="blockDateInput" style="width:auto;">
    </div>
    <button class="submit-btn" onclick="addBlockDate()" style="max-width:200px;margin-bottom:1.5rem;font-size:0.85rem;padding:0.7rem;">날짜 차단 추가</button>

    <div class="section-title">예약 현황</div>

    <div class="admin-stats">
      <div class="stat-card">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">전체 예약</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statToday">0</div>
        <div class="stat-label">오늘 예약</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statWeek">0</div>
        <div class="stat-label">이번 주</div>
      </div>
    </div>

    <div class="date-picker-row">
      <label>날짜 조회</label>
      <input type="date" id="adminDateFilter" onchange="renderAdminList()">
    </div>

    <button class="export-btn" onclick="exportCSV()">📥 CSV 내보내기</button>

    <div id="adminList"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// DATA LAYER - localStorage 기반
// ═══════════════════════════════════════════════

const STORE = {
  get: (key, def) => {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; }
  },
  set: (key, val) => localStorage.setItem(key, JSON.stringify(val))
};

let settings = STORE.get('mh_settings', {
  maxPerSlot: 5,
  slots: ['09:00','10:00','11:00','13:00','14:00','15:00','16:00'],
  weekdays: [1,2,3,4,5,6], // 월~토
  blockedDates: [],
  purposes: ['대출 상담','청약 문의','계약 관련','기타 문의']
});

let reservations = STORE.get('mh_reservations', []); // [{id, date, time, name, phone, count, purpose, note, createdAt}]

function saveSettings() {
  settings.maxPerSlot = parseInt(document.getElementById('maxPerSlot').value) || 5;
  settings.slots = document.getElementById('slotsConfig').value.split(',').map(s => s.trim()).filter(Boolean);
  STORE.set('mh_settings', settings);
  if (selectedDate) renderSlots(selectedDate);
}

function saveReservations() {
  STORE.set('mh_reservations', reservations);
}

function getSlotCount(date, time) {
  return reservations.filter(r => r.date === date && r.time === time).length;
}

// ═══════════════════════════════════════════════
// CALENDAR
// ═══════════════════════════════════════════════

let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let selectedDate = null;
let selectedTime = null;

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
}

function renderCalendar() {
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calTitle').textContent = `${currentYear}년 ${monthNames[currentMonth]}`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  ['일','월','화','수','목','금','토'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-name'; el.textContent = d; grid.appendChild(el);
  });

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);

  for (let i = 0; i < firstDay; i++) {
    grid.appendChild(Object.assign(document.createElement('div'), {className: 'cal-day'}));
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(currentYear, currentMonth, d);
    const dateStr = formatDate(date);
    const dow = date.getDay();
    const isPast = date < today;
    const isBlocked = settings.blockedDates.includes(dateStr);
    const isWeekdayOk = settings.weekdays.includes(dow);

    const el = document.createElement('div');
    el.className = 'cal-day';
    el.textContent = d;

    if (date.toDateString() === today.toDateString()) el.classList.add('today');
    if (selectedDate === dateStr) el.classList.add('selected');
    if (isPast || isBlocked || !isWeekdayOk) {
      el.classList.add('disabled', 'past');
    } else {
      // check if has any reservations
      const hasRes = reservations.some(r => r.date === dateStr);
      if (hasRes) {
        const dot = document.createElement('div'); dot.className = 'dot'; el.appendChild(dot);
      }
      el.onclick = () => selectDate(dateStr);
    }
    grid.appendChild(el);
  }
}

function selectDate(dateStr) {
  selectedDate = dateStr;
  selectedTime = null;
  renderCalendar();
  document.getElementById('slotsWrap').style.display = 'block';
  renderSlots(dateStr);
}

function renderSlots(dateStr) {
  const grid = document.getElementById('slotsGrid');
  grid.innerHTML = '';
  settings.slots.forEach(time => {
    const count = getSlotCount(dateStr, time);
    const max = settings.maxPerSlot;
    const isFull = count >= max;
    const pct = Math.round((count / max) * 100);

    const card = document.createElement('div');
    card.className = 'slot-card' + (isFull ? ' full' : '') + (selectedTime === time ? ' selected-slot' : '');

    const danger = pct >= 80;
    card.innerHTML = `
      <div class="slot-time">${time}</div>
      <div class="slot-count" style="color:${isFull?'#e57373':danger?'#f57c00':'var(--muted)'}">
        ${count}/${max}명 예약됨
      </div>
      <div class="slot-bar"><div class="slot-bar-fill${danger?' danger':''}" style="width:${pct}%"></div></div>
      ${isFull ? '<div class="full-badge">마감</div>' : ''}
    `;
    if (!isFull) card.onclick = () => selectTime(time);
    grid.appendChild(card);
  });
}

function selectTime(time) {
  selectedTime = time;
  renderSlots(selectedDate);
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';

  const d = new Date(selectedDate);
  document.getElementById('selectedSummary').textContent =
    `📅 ${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${['일','월','화','수','목','금','토'][d.getDay()]}) · ⏰ ${selectedTime}`;

  renderPurposes();
}

function renderPurposes() {
  const grid = document.getElementById('purposeGrid');
  grid.innerHTML = '';
  settings.purposes.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'purpose-btn';
    btn.textContent = p;
    btn.onclick = () => {
      document.querySelectorAll('.purpose-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
    grid.appendChild(btn);
  });
}

function goBack() {
  document.getElementById('step1').style.display = 'block';
  document.getElementById('step2').style.display = 'none';
  selectedTime = null;
  if (selectedDate) renderSlots(selectedDate);
}

// ═══════════════════════════════════════════════
// SUBMISSION
// ═══════════════════════════════════════════════

function submitReservation() {
  const name = document.getElementById('fname').value.trim();
  const phone = document.getElementById('fphone').value.trim();
  const count = document.getElementById('fcount').value;
  const note = document.getElementById('fnote').value.trim();
  const purposeBtn = document.querySelector('.purpose-btn.active');

  if (!name) { showToast('성함을 입력해 주세요'); return; }
  if (!phone) { showToast('연락처를 입력해 주세요'); return; }

  // Double-check slot availability
  if (getSlotCount(selectedDate, selectedTime) >= settings.maxPerSlot) {
    showToast('해당 시간대가 마감되었습니다');
    goBack(); return;
  }

  const reservation = {
    id: Date.now().toString(),
    date: selectedDate,
    time: selectedTime,
    name, phone, count: parseInt(count),
    purpose: purposeBtn ? purposeBtn.textContent : '미선택',
    note,
    createdAt: new Date().toISOString()
  };

  reservations.push(reservation);
  saveReservations();

  // Show success
  document.getElementById('bookingFlow').style.display = 'none';
  const d = new Date(selectedDate);
  document.getElementById('confirmBox').innerHTML = `
    <div class="confirm-row"><span>날짜</span><span>${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${['일','월','화','수','목','금','토'][d.getDay()]})</span></div>
    <div class="confirm-row"><span>시간</span><span>${selectedTime}</span></div>
    <div class="confirm-row"><span>성함</span><span>${name}</span></div>
    <div class="confirm-row"><span>연락처</span><span>${phone}</span></div>
    <div class="confirm-row"><span>상담 목적</span><span>${reservation.purpose}</span></div>
    <div class="confirm-row"><span>인원</span><span>${count}명</span></div>
  `;
  document.getElementById('successScreen').style.display = 'block';
}

function resetBooking() {
  selectedDate = null; selectedTime = null;
  document.getElementById('bookingFlow').style.display = 'block';
  document.getElementById('successScreen').style.display = 'none';
  document.getElementById('step1').style.display = 'block';
  document.getElementById('step2').style.display = 'none';
  document.getElementById('slotsWrap').style.display = 'none';
  document.getElementById('fname').value = '';
  document.getElementById('fphone').value = '';
  document.getElementById('fnote').value = '';
  renderCalendar();
}

// ═══════════════════════════════════════════════
// ADMIN
// ═══════════════════════════════════════════════

let adminPassword = STORE.get('mh_admin_pw', '1234');
let isAdminLoggedIn = false;

function adminLogin() {
  const pw = document.getElementById('adminPw').value;
  if (pw === adminPassword) {
    isAdminLoggedIn = true;
    document.getElementById('adminLoginWrap').style.display = 'none';
    document.getElementById('adminBody').style.display = 'block';
    initAdmin();
  } else {
    showToast('비밀번호가 올바르지 않습니다');
  }
}

function initAdmin() {
  document.getElementById('maxPerSlot').value = settings.maxPerSlot;
  document.getElementById('slotsConfig').value = settings.slots.join(',');
  renderWeekdayBtns();
  setAdminDateToToday();
  updateStats();
  renderAdminList();
}

function renderWeekdayBtns() {
  const names = ['일','월','화','수','목','금','토'];
  const wrap = document.getElementById('weekdayBtns');
  wrap.innerHTML = '';
  names.forEach((n, i) => {
    const btn = document.createElement('button');
    btn.textContent = n;
    btn.style.cssText = `padding:5px 12px;border-radius:20px;border:1.5px solid ${settings.weekdays.includes(i)?'var(--gold)':'#ddd'};background:${settings.weekdays.includes(i)?'rgba(200,169,110,0.15)':'white'};cursor:pointer;font-size:0.8rem;font-family:'Noto Sans KR',sans-serif;transition:all 0.15s;`;
    btn.onclick = () => toggleWeekday(i, btn);
    wrap.appendChild(btn);
  });
}

function toggleWeekday(i, btn) {
  const idx = settings.weekdays.indexOf(i);
  if (idx === -1) settings.weekdays.push(i);
  else settings.weekdays.splice(idx, 1);
  btn.style.borderColor = settings.weekdays.includes(i) ? 'var(--gold)' : '#ddd';
  btn.style.background = settings.weekdays.includes(i) ? 'rgba(200,169,110,0.15)' : 'white';
  saveSettings();
}

function adjustMax(dir) {
  const inp = document.getElementById('maxPerSlot');
  inp.value = Math.max(1, Math.min(30, parseInt(inp.value) + dir));
  saveSettings();
}

function addBlockDate() {
  const val = document.getElementById('blockDateInput').value;
  if (!val) { showToast('날짜를 선택하세요'); return; }
  if (!settings.blockedDates.includes(val)) {
    settings.blockedDates.push(val);
    STORE.set('mh_settings', settings);
    showToast(`${val} 차단 완료`);
    if (selectedDate) renderCalendar();
  } else {
    showToast('이미 차단된 날짜입니다');
  }
}

function setAdminDateToToday() {
  const today = formatDate(new Date());
  document.getElementById('adminDateFilter').value = today;
}

function updateStats() {
  const today = formatDate(new Date());
  const weekStart = new Date(); weekStart.setDate(weekStart.getDate() - weekStart.getDay());
  const weekEnd = new Date(weekStart); weekEnd.setDate(weekEnd.getDate() + 6);

  document.getElementById('statTotal').textContent = reservations.length;
  document.getElementById('statToday').textContent = reservations.filter(r => r.date === today).length;
  document.getElementById('statWeek').textContent = reservations.filter(r => {
    const d = new Date(r.date);
    return d >= weekStart && d <= weekEnd;
  }).length;
}

function renderAdminList() {
  const filterDate = document.getElementById('adminDateFilter').value;
  const list = document.getElementById('adminList');

  let filtered = filterDate ? reservations.filter(r => r.date === filterDate) : reservations;
  filtered = [...filtered].sort((a,b) => a.time.localeCompare(b.time));

  updateStats();

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="icon">📭</div>${filterDate ? '해당 날짜에 예약이 없습니다' : '예약 내역이 없습니다'}</div>`;
    return;
  }

  // Group by date
  const byDate = {};
  filtered.forEach(r => {
    if (!byDate[r.date]) byDate[r.date] = [];
    byDate[r.date].push(r);
  });

  list.innerHTML = '';
  Object.keys(byDate).sort().forEach(date => {
    const d = new Date(date);
    const header = document.createElement('div');
    header.className = 'res-day-header';
    header.textContent = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${['일','월','화','수','목','금','토'][d.getDay()]}) — ${byDate[date].length}건`;
    list.appendChild(header);

    byDate[date].forEach(r => {
      const item = document.createElement('div');
      item.className = 'res-item';
      item.innerHTML = `
        <div class="res-time-badge">${r.time}</div>
        <div class="res-info">
          <div class="res-name">${r.name} <span style="font-weight:400;color:var(--muted);font-size:0.82rem;">${r.count}명</span></div>
          <div class="res-detail">${r.phone}</div>
          <div class="res-purpose">${r.purpose}</div>
          ${r.note ? `<div class="res-detail" style="margin-top:3px;">💬 ${r.note}</div>` : ''}
        </div>
        <button class="res-delete" onclick="deleteReservation('${r.id}')" title="삭제">✕</button>
      `;
      list.appendChild(item);
    });
  });
}

function deleteReservation(id) {
  if (!confirm('예약을 삭제하시겠습니까?')) return;
  reservations = reservations.filter(r => r.id !== id);
  saveReservations();
  renderAdminList();
  updateStats();
  showToast('예약이 삭제되었습니다');
}

function exportCSV() {
  const headers = ['날짜','시간','성함','연락처','인원','상담목적','메모','예약일시'];
  const rows = reservations.map(r => [
    r.date, r.time, r.name, r.phone, r.count, r.purpose,
    (r.note || '').replace(/,/g,''), r.createdAt
  ]);
  const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `예약현황_${formatDate(new Date())}.csv`;
  a.click();
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════

function formatDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i === (tab==='booking'?0:1)));
  document.getElementById('section-booking').classList.toggle('active', tab==='booking');
  document.getElementById('section-admin').classList.toggle('active', tab==='admin');
}

let toastTimer;
function showToast(msg) {
  clearTimeout(toastTimer);
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  toastTimer = setTimeout(() => el.remove(), 2500);
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
renderCalendar();
</script>
